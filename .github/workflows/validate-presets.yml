name: Validate presets

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanity-check python3 availability
        run: python3 --version

      - name: Run preset validation
        run: bash scripts/validate-presets.sh
